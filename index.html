            url = canvas.toDataURL('image/jpeg', 0.72);
          } finally {
            if (thumbnailRenderTasks.get(pageNumber) === renderTask) {
              thumbnailRenderTasks.delete(pageNumber);
            }
          }
        }
      }

      if (url) {
        state.thumbnailCache.set(cacheKey, url);
      }
      return url;
    };

    let thumbnailObserver = null;
    let thumbnailSentinelObserver = null;
    let thumbnailSentinelTop = null;
    let thumbnailSentinelBottom = null;

    const buildThumbnailItem = (i, renderToken) => {
      const item = document.createElement('div');
      item.className = `thumbnail-item ${i === state.currentPage ? 'current' : ''}`;
      item.addEventListener('click', () => {
        closeThumbnailPanel();
        if (i !== state.currentPage) {
          void goToPageInstant(i);
        }
      });
      item.dataset.page = String(i);

      const img = document.createElement('img');
      img.className = 'thumbnail-thumb';
      img.alt = `第 ${i} 页`;
      img.style.opacity = '0.55';

      const label = document.createElement('div');
      label.className = 'thumbnail-page';
      label.textContent = `第 ${i} 页`;

      item.appendChild(img);
      item.appendChild(label);

      // 使用 IntersectionObserver 懒加载缩略图图像
      if (thumbnailObserver) {
        thumbnailObserver.observe(item);
      }
      return item;
    };

    const BATCH_SIZE = 10;
    const PRELOAD_BATCHES = 2;
    let currentBatchStart = 1;
    let currentBatchEnd = 0;
    const THUMBNAIL_FILL_MARGIN = 220;
    let thumbnailFillRaf = 0;
    const THUMBNAIL_RENDER_CONCURRENCY = 2;
    const thumbnailRenderQueue = [];
    let thumbnailRenderActive = 0;
    const thumbnailRenderTasks = new Map();

    const scheduleThumbnailWork = (task) => {
      if ('requestIdleCallback' in window) {
        window.requestIdleCallback(() => task(), { timeout: 300 });
        return;
      }
      window.setTimeout(task, 0);
    };

    const pumpThumbnailRenderQueue = () => {
      if (!state.thumbnailPanelOpen) return;
      while (thumbnailRenderActive < THUMBNAIL_RENDER_CONCURRENCY && thumbnailRenderQueue.length) {
        const job = thumbnailRenderQueue.shift();
        if (!job || job.renderToken !== state.thumbnailRenderToken) {
          continue;
        }
        thumbnailRenderActive += 1;
        scheduleThumbnailWork(() => {
          if (job.renderToken !== state.thumbnailRenderToken) {
            thumbnailRenderActive = Math.max(0, thumbnailRenderActive - 1);
            return;
          }
          void renderThumbnailPage(job.pageNumber)
            .then((url) => {
              if (job.renderToken !== state.thumbnailRenderToken) return;
              const item = job.img.closest('.thumbnail-item');
              if (url && job.img.isConnected) {
                job.img.src = url;
                job.img.style.opacity = '1';
              }
              if (item) {
                if (url) {
                  item.dataset.loaded = '1';
                  if (thumbnailObserver) {
                    thumbnailObserver.unobserve(item);
                  }
                }
                item.dataset.pending = '';
              }
            })
            .catch(() => {})
            .finally(() => {
              if (job.renderToken === state.thumbnailRenderToken) {
                thumbnailRenderActive = Math.max(0, thumbnailRenderActive - 1);
                pumpThumbnailRenderQueue();
              }
            });
        });
      }
    };

    const promoteThumbnailRender = (pageNumber) => {
      const index = thumbnailRenderQueue.findIndex((job) => job.pageNumber === pageNumber);
      if (index > 0) {
        const [job] = thumbnailRenderQueue.splice(index, 1);
        thumbnailRenderQueue.unshift(job);
      }
    };

    const enqueueThumbnailRender = (pageNumber, img, renderToken, priority = 'normal') => {
      if (renderToken !== state.thumbnailRenderToken) return;
      if (thumbnailRenderTasks.has(pageNumber)) return;

      const existingIndex = thumbnailRenderQueue.findIndex((job) => job.pageNumber === pageNumber);
      if (existingIndex >= 0) {
        const [job] = thumbnailRenderQueue.splice(existingIndex, 1);
        if (priority === 'high') {
          thumbnailRenderQueue.unshift(job);
        } else {
          thumbnailRenderQueue.push(job);
        }
        pumpThumbnailRenderQueue();
        return;
      }

      const job = { pageNumber, img, renderToken };
      if (priority === 'high') {
        thumbnailRenderQueue.unshift(job);
      } else {
        thumbnailRenderQueue.push(job);
      }
      pumpThumbnailRenderQueue();
    };

    const cancelThumbnailRenders = () => {
      thumbnailRenderQueue.length = 0;
      thumbnailRenderActive = 0;
      thumbnailRenderTasks.forEach((task) => {
        try {
          task.cancel();
        } catch (_) {
          /* ignore */
        }
      });
      thumbnailRenderTasks.clear();
    };

    const createThumbnailSentinel = (position) => {
      const node = document.createElement('div');
      node.dataset.pos = position;
      node.style.height = '1px';
      node.style.width = '100%';
      return node;
    };

    const shouldLoadPrevThumbnails = () => {
      if (!state.thumbnailPanelOpen) return false;
      if (currentBatchStart <= 1) return false;
      return thumbnailGrid.scrollTop < THUMBNAIL_FILL_MARGIN;
    };

    const shouldLoadNextThumbnails = () => {
      if (!state.thumbnailPanelOpen) return false;
      if (currentBatchEnd >= state.pageCount) return false;
      const remaining = thumbnailGrid.scrollHeight - thumbnailGrid.scrollTop - thumbnailGrid.clientHeight;
      return remaining < THUMBNAIL_FILL_MARGIN;
    };

    const syncThumbnailSentinels = (renderToken) => {
      if (renderToken !== state.thumbnailRenderToken) return;

      if (currentBatchStart > 1) {
        if (!thumbnailSentinelTop) {
          thumbnailSentinelTop = createThumbnailSentinel('top');
        }
        if (!thumbnailSentinelTop.parentNode) {
          thumbnailGrid.insertBefore(thumbnailSentinelTop, thumbnailGrid.firstChild);
        }
        if (thumbnailSentinelObserver) {
          thumbnailSentinelObserver.observe(thumbnailSentinelTop);
        }
      } else if (thumbnailSentinelTop && thumbnailSentinelTop.parentNode) {
        if (thumbnailSentinelObserver) {
          thumbnailSentinelObserver.unobserve(thumbnailSentinelTop);
        }
        thumbnailSentinelTop.remove();
      }

      if (currentBatchEnd < state.pageCount) {
        if (!thumbnailSentinelBottom) {
          thumbnailSentinelBottom = createThumbnailSentinel('bottom');
        }
        if (!thumbnailSentinelBottom.parentNode) {
          thumbnailGrid.appendChild(thumbnailSentinelBottom);
        }
        if (thumbnailSentinelObserver) {
          thumbnailSentinelObserver.observe(thumbnailSentinelBottom);
        }
      } else if (thumbnailSentinelBottom && thumbnailSentinelBottom.parentNode) {
        if (thumbnailSentinelObserver) {
          thumbnailSentinelObserver.unobserve(thumbnailSentinelBottom);
        }
        thumbnailSentinelBottom.remove();
      }
    };

    const addNextBatch = (renderToken) => {
      const start = currentBatchEnd + 1;
      const end = Math.min(start + BATCH_SIZE - 1, state.pageCount);
      if (start > state.pageCount || renderToken !== state.thumbnailRenderToken) return;

      const fragment = document.createDocumentFragment();
      for (let i = start; i <= end; i++) {
        fragment.appendChild(buildThumbnailItem(i, renderToken));
      }

      // 移除哨兵（如果有），添加新项目，再添加哨兵
      if (thumbnailSentinelBottom && thumbnailSentinelBottom.parentNode) {
        thumbnailGrid.insertBefore(fragment, thumbnailSentinelBottom);
      } else {
        thumbnailGrid.appendChild(fragment);
      }

      currentBatchStart = Math.min(currentBatchStart, start);
      currentBatchEnd = end;
      syncThumbnailSentinels(renderToken);
    };

    const addPrevBatch = (renderToken) => {
      const end = currentBatchStart - 1;
      const start = Math.max(1, end - BATCH_SIZE + 1);
      if (end < start || renderToken !== state.thumbnailRenderToken) return;

      const prevScrollHeight = thumbnailGrid.scrollHeight;
      const prevScrollTop = thumbnailGrid.scrollTop;

      const fragment = document.createDocumentFragment();
      for (let i = start; i <= end; i++) {
        fragment.appendChild(buildThumbnailItem(i, renderToken));
      }

      if (thumbnailSentinelTop && thumbnailSentinelTop.parentNode) {
        thumbnailGrid.insertBefore(fragment, thumbnailSentinelTop.nextSibling);
      } else if (thumbnailGrid.firstChild) {
        thumbnailGrid.insertBefore(fragment, thumbnailGrid.firstChild);
      } else {
        thumbnailGrid.appendChild(fragment);
      }

      currentBatchStart = start;
      syncThumbnailSentinels(renderToken);

      const nextScrollHeight = thumbnailGrid.scrollHeight;
      thumbnailGrid.scrollTop = prevScrollTop + (nextScrollHeight - prevScrollHeight);
    };

    const ensureThumbnailFill = (renderToken) => {
      if (thumbnailFillRaf) return;
      thumbnailFillRaf = window.requestAnimationFrame(() => {
        thumbnailFillRaf = 0;
        if (renderToken !== state.thumbnailRenderToken) return;
        let guard = 0;
        while ((shouldLoadPrevThumbnails() || shouldLoadNextThumbnails()) && guard < 6) {
          if (shouldLoadPrevThumbnails()) {
            addPrevBatch(renderToken);
          }
          if (shouldLoadNextThumbnails()) {
            addNextBatch(renderToken);
          }
          guard += 1;
        }
        if ((shouldLoadPrevThumbnails() || shouldLoadNextThumbnails()) && renderToken === state.thumbnailRenderToken) {
          ensureThumbnailFill(renderToken);
        }
      });
    };

    const scrollThumbnailToCurrent = () => {
      const item = thumbnailGrid.querySelector(`[data-page="${state.currentPage}"]`);
      if (!item) return;
      const itemHeight = item.getBoundingClientRect().height || 0;
      const targetTop = item.offsetTop - (thumbnailGrid.clientHeight - itemHeight) / 2;
      const maxTop = Math.max(0, thumbnailGrid.scrollHeight - thumbnailGrid.clientHeight);
      thumbnailGrid.scrollTop = clamp(targetTop, 0, maxTop);
    };

    const buildThumbnailGrid = async () => {
      if (state.mode === 'idle') return;

      thumbnailGrid.innerHTML = '';
      currentBatchStart = 1;
      currentBatchEnd = 0;
      const renderToken = ++state.thumbnailRenderToken;

      // 断开旧的观察者
      if (thumbnailObserver) {
        thumbnailObserver.disconnect();
      }
      if (thumbnailSentinelObserver) {
        thumbnailSentinelObserver.disconnect();
      }

      cancelThumbnailRenders();
      thumbnailSentinelTop = null;
      thumbnailSentinelBottom = null;

      // 缩略图图像懒加载观察器
      thumbnailObserver = new IntersectionObserver(
        (entries) => {
          const queueCandidates = [];
          let rootCenter = null;
          for (const entry of entries) {
            if (!entry.isIntersecting) continue;
            const item = entry.target;
            const pageNumber = Number(item.dataset.page || 0);
            if (!pageNumber) continue;
            if (item.dataset.loaded === '1') {
              thumbnailObserver.unobserve(item);
              continue;
            }
            if (item.dataset.pending === '1') {
              promoteThumbnailRender(pageNumber);
              continue;
            }
            if (thumbnailRenderTasks.has(pageNumber)) {
              continue;
            }
            const img = item.querySelector('img');
            if (!img) continue;

            item.dataset.pending = '1';
            if (rootCenter === null) {
              const rootBounds = entry.rootBounds || thumbnailGrid.getBoundingClientRect();
              rootCenter = (rootBounds.top + rootBounds.bottom) / 2;
            }
            const bounds = entry.boundingClientRect;
            const entryCenter = (bounds.top + bounds.bottom) / 2;
            const distance = rootCenter === null ? 0 : Math.abs(entryCenter - rootCenter);
            queueCandidates.push({ pageNumber, img, distance });
          }

          if (queueCandidates.length) {
            queueCandidates.sort((a, b) => b.distance - a.distance);
            queueCandidates.forEach((candidate) => {
              enqueueThumbnailRender(candidate.pageNumber, candidate.img, renderToken, 'high');
            });
          }
        },
        { root: thumbnailGrid, rootMargin: '120px 0px', threshold: 0.01 },
      );

      // 列数：根据容器宽度自适应
      let colCount = 1;
      const panelWidth = thumbnailGrid.clientWidth || 300;
      if (panelWidth > 200) colCount = 2;
      if (panelWidth > 340) colCount = 3;

      thumbnailGrid.style.gridTemplateColumns = `repeat(${colCount}, minmax(0, 1fr))`;

      // 先创建哨兵观察器，再渲染初始窗口
      thumbnailSentinelObserver = new IntersectionObserver(
        (entries) => {
          for (const entry of entries) {
            if (!entry.isIntersecting || renderToken !== state.thumbnailRenderToken) continue;
            if (entry.target === thumbnailSentinelTop) {
              addPrevBatch(renderToken);
            } else if (entry.target === thumbnailSentinelBottom) {
              addNextBatch(renderToken);
            }
            ensureThumbnailFill(renderToken);
          }
        },
        { root: thumbnailGrid, rootMargin: '200px 0px', threshold: 0.01 },
      );

      const targetStart = Math.max(1, state.currentPage - PRELOAD_BATCHES * BATCH_SIZE);
      const targetEnd = Math.min(state.pageCount, state.currentPage + PRELOAD_BATCHES * BATCH_SIZE);
      currentBatchStart = targetStart;
      currentBatchEnd = targetStart - 1;
      while (currentBatchEnd < targetEnd) {
        addNextBatch(renderToken);
      }

      window.requestAnimationFrame(() => {
        scrollThumbnailToCurrent();
        ensureThumbnailFill(renderToken);
      });
    };

    const openThumbnailPanel = async () => {
      if (state.mode === 'idle') return;
      state.thumbnailPanelOpen = true;
      thumbnailShade.classList.remove('hidden');
      thumbnailPanel.classList.remove('hidden');
      thumbnailShade.setAttribute('aria-hidden', 'false');
      thumbnailPanel.setAttribute('aria-hidden', 'false');
      thumbnailShade.classList.add('open');
      thumbnailPanel.classList.add('open');
      window.requestAnimationFrame(() => {
        void buildThumbnailGrid();
      });
    };

    const closeThumbnailPanel = () => {
      state.thumbnailPanelOpen = false;
      state.thumbnailRenderToken += 1;
      if (thumbnailFillRaf) {
        window.cancelAnimationFrame(thumbnailFillRaf);
        thumbnailFillRaf = 0;
      }
      if (thumbnailObserver) {
        thumbnailObserver.disconnect();
      }
      if (thumbnailSentinelObserver) {
        thumbnailSentinelObserver.disconnect();
      }
      cancelThumbnailRenders();
      currentBatchStart = 1;
      currentBatchEnd = 0;
      thumbnailSentinelTop = null;
      thumbnailSentinelBottom = null;
      thumbnailShade.classList.remove('open');
      thumbnailPanel.classList.remove('open');
      thumbnailShade.setAttribute('aria-hidden', 'true');
      thumbnailPanel.setAttribute('aria-hidden', 'true');
      window.setTimeout(() => {
        if (!state.thumbnailPanelOpen) {
          thumbnailShade.classList.add('hidden');
          thumbnailPanel.classList.add('hidden');
          thumbnailGrid.innerHTML = '';
        }
      }, 240);
    };

    fileInput.addEventListener('change', (event) => {
      void loadFiles(event.target.files);
      fileInput.value = '';
    });

    pageDisplay.addEventListener('click', () => {
      startPageEdit();
    });

    // 在 document 级别拦截 dragover/drop，防止 Edge 在拖放到页面非 shell 区域时打开新窗口
    document.addEventListener('dragover', (event) => {
      event.preventDefault();
      event.dataTransfer.dropEffect = 'copy';
    });
    document.addEventListener('drop', (event) => {
      event.preventDefault();
      event.stopPropagation();
      // 只有当 drop 不在 shell 内部时，才在此处理（shell 自己会处理内部 drop）
      if (!shell.contains(event.target) && event.dataTransfer?.files?.length) {
        void loadFiles(event.dataTransfer.files);
      }
    });

    shell.addEventListener('dragenter', (event) => {
      event.preventDefault();
      event.stopPropagation();
      if (!state.dragOver) {
        shell.classList.add('dragover');
        state.dragOver = true;
      }
    });

    shell.addEventListener('dragover', (event) => {
      event.preventDefault();
      event.stopPropagation();
      event.dataTransfer.dropEffect = 'copy';
      if (!state.dragOver) {
        shell.classList.add('dragover');
        state.dragOver = true;
      }
    });

    shell.addEventListener('dragleave', (event) => {
      event.preventDefault();
      event.stopPropagation();
      if (event.target === shell || event.target === stageInner) {
        shell.classList.remove('dragover');
        state.dragOver = false;
      }
    });

    shell.addEventListener('drop', handleDrop);

    // pointermove 在 stageInner 上监听，在下面添加
    stageInner.addEventListener('pointerdown', onPointerDown);
    shell.addEventListener('pointerdown', (event) => {
      if (stageInner.contains(event.target)) return;
      onPointerDown(event);
    });
    stageInner.addEventListener('pointerup', onPointerUp);
    stageInner.addEventListener('pointercancel', onPointerUp);
    stageInner.addEventListener('mousedown', onMouseDown);
    stageInner.addEventListener('mousemove', onMouseMove);
    stageInner.addEventListener('mouseup', finishMouseFallback);
    stageInner.addEventListener('mouseleave', finishMouseFallback);
    stageInner.addEventListener('dblclick', onDoubleClick);

    leftEdge.addEventListener('click', () => {
      void prevPage();
    });

    rightEdge.addEventListener('click', () => {
      void nextPage();
    });

    loadFacePrefs();
    buildFaceBlendshapePanel();
    buildFaceThresholdPanel();
    updateFaceToggleUI();
    updateFaceModeUI();

    faceBtn.addEventListener('click', () => {
      faceOverlay.classList.remove('hidden');
      faceOverlay.setAttribute('aria-hidden', 'false');
    });

    faceClose.addEventListener('click', () => {
      faceOverlay.classList.add('hidden');
      faceOverlay.setAttribute('aria-hidden', 'true');
    });

    faceOverlay.addEventListener('click', (event) => {
      if (event.target === faceOverlay) {
        faceOverlay.classList.add('hidden');
        faceOverlay.setAttribute('aria-hidden', 'true');
      }
    });

    faceStartBtn.addEventListener('click', () => {
      if (faceState.running) {
        stopFaceRecognition();
      } else {
        void startFaceRecognition();
      }
    });

    faceEnableBtn.addEventListener('click', () => {
      faceState.enabled = !faceState.enabled;
      updateFaceToggleUI();
      saveFacePrefs();
    });

    faceMeshBtn.addEventListener('click', () => {
      faceState.showMesh = !faceState.showMesh;
      updateFaceToggleUI();
      if (!faceState.showMesh) {
        clearFaceCanvas();
      }
      saveFacePrefs();
    });

    faceModeWink.addEventListener('click', () => {
      faceState.triggerMode = 'wink';
      updateFaceModeUI();
      saveFacePrefs();
    });

    faceModePucker.addEventListener('click', () => {
      faceState.triggerMode = 'pucker';
      updateFaceModeUI();
      saveFacePrefs();
    });

    faceModeBoth.addEventListener('click', () => {
      faceState.triggerMode = 'both';
      updateFaceModeUI();
      saveFacePrefs();
    });

    fullscreenBtn.addEventListener('click', () => {
      void toggleFullscreen();
    });

    thumbnailBtn.addEventListener('click', () => {
      if (state.thumbnailPanelOpen) {
        closeThumbnailPanel();
      } else {
        void openThumbnailPanel();
      }
    });

    thumbnailPanel.querySelector('.thumbnail-close')?.addEventListener('click', () => {
      closeThumbnailPanel();
    });

    thumbnailShade.addEventListener('click', () => {
      closeThumbnailPanel();
    });

    thumbnailGrid.addEventListener('wheel', (event) => {
      event.stopPropagation();
    }, { passive: true });

    thumbnailGrid.addEventListener('scroll', () => {
      if (state.thumbnailPanelOpen) {
        ensureThumbnailFill(state.thumbnailRenderToken);
      }
    }, { passive: true });

    resetBtn.addEventListener('click', () => {
      localStorage.removeItem(SESSION_META_KEY);
      idbDelete('currentFile').catch(() => {});
      idbDelete('currentFiles').catch(() => {});
      void resetViewer();
    });

    document.addEventListener('fullscreenchange', updateTopStatus);
    window.addEventListener('resize', onResize);

    document.addEventListener('keydown', (event) => {
      if (state.mode === 'idle') return;

      if (event.key === 'ArrowLeft') {
        void prevPage();
        return;
      }
      if (event.key === 'ArrowRight') {
        void nextPage();
        return;
      }
      if (event.key === ' ') {
        event.preventDefault();
        void nextPage();
        return;
      }
      if (event.key === 'Escape' && document.fullscreenElement) {
        void document.exitFullscreen();
        return;
      }
      if (event.key === '+' || event.key === '=') {
        const rect = stageInner.getBoundingClientRect();
        setZoomLevel(state.zoom + ZOOM_STEP, { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 });
        return;
      }
      if (event.key === '-' || event.key === '_') {
        const rect = stageInner.getBoundingClientRect();
        setZoomLevel(state.zoom - ZOOM_STEP, { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 });
      }
    });

    stageInner.addEventListener('wheel', onWheel, { passive: false });
    stageInner.addEventListener('pointermove', onPointerMove);

    // 在 document 级别也监听 pointermove，确保滑动翻页时即使手指滑出 stage 也能正常跟踪
    document.addEventListener('pointermove', (event) => {
      if (state.pointers.has(event.pointerId)) {
        onPointerMove(event);
      }
    }, { passive: false });
    document.addEventListener('pointerup', (event) => {
      if (state.pointers.has(event.pointerId)) {
        onPointerUp(event);
      }
    });
    document.addEventListener('pointercancel', (event) => {
      if (state.pointers.has(event.pointerId)) {
        onPointerUp(event);
      }
    });

    window.addEventListener('beforeunload', () => {
      // 保存当前状态
      saveSessionState();
      stopFaceRecognition();
      clearPdfCache();
      revokeAllUrls();
      if (state.pdfDoc) {
        void state.pdfDoc.destroy();
      }
    });

    // ============ 会话持久化 ============
    const SESSION_DB_NAME = 'music-score-viewer-session';
    const SESSION_DB_STORE = 'files';
    const SESSION_META_KEY = 'music-score-viewer-meta';

    const openSessionDB = () => new Promise((resolve, reject) => {
      const req = indexedDB.open(SESSION_DB_NAME, 1);
      req.onupgradeneeded = () => {
        req.result.createObjectStore(SESSION_DB_STORE);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });

    const idbPut = async (key, value) => {
      const db = await openSessionDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(SESSION_DB_STORE, 'readwrite');
        tx.objectStore(SESSION_DB_STORE).put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    };

    const idbGet = async (key) => {
      const db = await openSessionDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(SESSION_DB_STORE, 'readonly');
        const req = tx.objectStore(SESSION_DB_STORE).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    };

    const idbDelete = async (key) => {
      const db = await openSessionDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(SESSION_DB_STORE, 'readwrite');
        tx.objectStore(SESSION_DB_STORE).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    };

    const saveSessionState = () => {
      if (state.mode === 'idle' || state.pageCount === 0) return;
      try {
        const meta = {
          mode: state.mode,
          title: state.title,
          currentPage: state.currentPage,
          pageCount: state.pageCount,
          savedAt: Date.now(),
        };
        localStorage.setItem(SESSION_META_KEY, JSON.stringify(meta));
      } catch (_) { /* ignore quota errors */ }
    };

    void resetViewer().then(async () => {
      // 尝试恢复上次会话
      let meta = null;
      try {
        const raw = localStorage.getItem(SESSION_META_KEY);
        if (raw) meta = JSON.parse(raw);
      } catch (_) { /* ignore */ }

      if (!meta || !meta.mode || !meta.pageCount) return;

      // 检查存储的数据是否在 24 小时内
      if (Date.now() - (meta.savedAt || 0) > 24 * 60 * 60 * 1000) {
        localStorage.removeItem(SESSION_META_KEY);
        return;
      }

      try {
        if (meta.mode === 'pdf') {
          const buffer = await idbGet('currentFile');
          if (!buffer) {
            localStorage.removeItem(SESSION_META_KEY);
            return;
          }
          setFooter('正在恢复上次会话...');
          const file = new File([buffer], meta.title || 'document.pdf', { type: 'application/pdf' });
          await setPdfSong(file);
          // 保存文件引用以便后续恢复
          state._restoredFileBuffer = buffer;
        } else if (meta.mode === 'image') {
          const buffers = await idbGet('currentFiles');
          if (!buffers || !Array.isArray(buffers) || buffers.length === 0) {
            localStorage.removeItem(SESSION_META_KEY);
            return;
          }
          setFooter('正在恢复上次会话...');
          const files = buffers.map((buf, i) =>
            new File([buf], `image-${i}.jpg`, { type: 'image/jpeg' })
          );
          await setImageSong(files);
        }

        // 恢复页码
        if (meta.currentPage && meta.currentPage > 1 && meta.currentPage <= state.pageCount) {
          void goToPageInstant(meta.currentPage);
        }
        setFooter(`已恢复上次会话：${state.title}，第 ${state.currentPage} / ${state.pageCount} 页`);
      } catch (e) {
        console.warn('恢复会话失败', e);
        localStorage.removeItem(SESSION_META_KEY);
      }
    });

  </script>
</body>
</html>
